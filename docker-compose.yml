# =============================================================================
# Docker Compose — nestjs-enterprise-starter
#
# Ce fichier démarre UNIQUEMENT Microsoft SQL Server 2022.
# L'application NestJS s'exécute localement sur la machine du développeur
# (npm run start:dev) et n'est volontairement pas conteneurisée ici.
#
# Les variables proviennent du fichier d'environnement passé par les scripts
# npm (--env-file .env.local). Exemple : npm run docker:db:up
# =============================================================================

name: nestjs-enterprise-starter

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: nestjs-starter-sqlserver
    environment:
      # Acceptation de la licence Microsoft SQL Server (obligatoire)
      ACCEPT_EULA: 'Y'
      # Mot de passe administrateur : jamais codé en dur, toujours fourni
      # par le fichier d'environnement
      MSSQL_SA_PASSWORD: ${DB_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - '${DB_PORT:-1433}:1433'
    volumes:
      # Volume nommé : les données survivent aux redémarrages du conteneur
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      # sqlcmd v18 impose -C pour accepter le certificat auto-signé du conteneur.
      # 127.0.0.1 explicite : "localhost" se résout en IPv6 dans le conteneur
      # et fait échouer la connexion.
      test:
        [
          'CMD-SHELL',
          '/opt/mssql-tools18/bin/sqlcmd -S 127.0.0.1 -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" -b',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - nestjs-starter-network

volumes:
  sqlserver-data:
    name: nestjs-starter-sqlserver-data

networks:
  nestjs-starter-network:
    name: nestjs-starter-network
